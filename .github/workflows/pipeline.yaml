name: 'Pipeline CI/CD'
description: 'Automated testing and linting pipeline'

permissions:
  contents: read
  actions: read
  pull-requests: write
  checks: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch:
    description: 'Manual trigger for full pipeline'
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

env:
  NODE_VERSION: '22.x'
  NODE_ENV: 'test'

jobs:
  # ===== CODE QUALITY =====
  code_quality:
    name: '🔍 Code Quality - MegaLinter'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    continue-on-error: true
    
    steps:
      - name: '📥 Checkout repository'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: '🔍 Run MegaLinter'
        uses: oxsecurity/megalinter@v9
        env:
          DOCKER_IMAGE_CACHE: true
          SHOW_ELAPSED_TIME: true
          VALIDATE_ALL_CODEBASE: ${{ github.event_name == 'workflow_dispatch' }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ENABLE: JAVASCRIPT,TYPESCRIPT,JSON,PRETTIER,ESLINT,JEST,PLAYWRIGHT,SPELL,COPYPASTE,HTML,CSS,MARKDOWN,YAML

      - name: '📊 Upload MegaLinter reports'
        uses: actions/upload-artifact@v4
        if: success() || failure()
        with:
          name: megalinter-reports
          include-hidden-files: 'true'
          path: |
            megalinter-reports
            mega-linter.log
          retention-days: 30

  # ===== UNIT TESTS =====
  unit_tests:
    name: '✅ Unit Tests'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: code_quality
    if: always()
    
    steps:
      - name: '📥 Checkout repository'
        uses: actions/checkout@v4

      - name: '⚙️ Setup Node.js'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'yarn'

      - name: '📦 Install dependencies'
        run: yarn install --frozen-lockfile

      - name: '🧪 Run unit tests'
        run: yarn run test

      - name: '📊 Upload coverage reports'
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-coverage
          path: reports/coverage/lcov-report/
          retention-days: 30

      - name: '📈 Publish test results'
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: 'Unit Test Results'
          path: reports/junit.xml
          reporter: jest-junit
          summary-delta-report: true
          insights-report: true
          flaky-rate-report: true
          fail-rate-report: true
          slowest-report: true
          upload-artifact: true
          report-path: './ctrf/*.json'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: '💬 Comment PR with test results'
        uses: ctrf-io/github-test-reporter@v1
        if: always() && github.event_name == 'pull_request'
        with:
          report-path: './ctrf/*.json'
          pull-request-report: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ===== MUTATION TESTS =====
  mutation_tests:
    name: '🧬 Mutation Tests'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: code_quality
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'push'
    
    steps:
      - name: '📥 Checkout repository'
        uses: actions/checkout@v4

      - name: '⚙️ Setup Node.js'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'yarn'

      - name: '📦 Install dependencies'
        run: yarn install --frozen-lockfile

      - name: '🧬 Run mutation tests'
        run: yarn run test:mutation

      - name: '📊 Upload mutation reports'
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mutation-test-report
          path: reports/mutation/
          retention-days: 30

  # ===== E2E TESTS =====
  e2e_tests:
    name: '🎭 E2E Tests'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: code_quality
    if: always()
    
    steps:
      - name: '📥 Checkout repository'
        uses: actions/checkout@v4

      - name: '⚙️ Setup Node.js'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'yarn'

      - name: '📦 Install dependencies'
        run: yarn install --frozen-lockfile

      - name: '🎭 Install Playwright browsers'
        run: yarn playwright install --with-deps

      - name: '🎭 Run E2E tests'
        run: yarn run e2e

      - name: '📊 Upload E2E reports'
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30